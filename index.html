<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding - Playstyle Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.plot.ly/plotly-3.1.1.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        cyber: {
                            base: '#121212',
                            card: '#1A1A2E',
                            cardHover: '#252839',
                            violet: '#8A2BE2',
                            violetGlow: 'rgba(138, 43, 226, 0.5)',
                            emerald: '#50C878',
                            emeraldGlow: 'rgba(80, 200, 120, 0.4)',
                            text: '#F2F2F2',
                            textMuted: '#94969F',
                            border: '#2A2A35'
                        }
                    },
                    backgroundImage: {
                        'cyber-gradient': 'linear-gradient(180deg, #121212 0%, #1A1A2E 100%)',
                        'card-gradient': 'linear-gradient(145deg, #1E1E21 0%, #121212 100%)',
                    },
                    boxShadow: {
                        'neon-violet': '0 0 15px rgba(138, 43, 226, 0.3)',
                        'neon-emerald': '0 4px 20px rgba(80, 200, 120, 0.4)',
                        'card-inset': 'inset 0 1px 0 rgba(255, 255, 255, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #121212;
            color: #F2F2F2;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 43, 226, 0.2);
        }
        
        .hex-bg {
            background-image: radial-gradient(rgba(138, 43, 226, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .custom-checkbox input:checked + div {
            background-color: rgba(138, 43, 226, 0.2);
            border-color: #8A2BE2;
            box-shadow: inset 0 0 10px rgba(138, 43, 226, 0.2);
        }
        .custom-checkbox input:checked + div i {
            color: #8A2BE2;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #8A2BE2;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #2A2A35;
            border-radius: 2px;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        #mobile-container {
            height: 100vh;
            height: 100dvh;
            max-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
        }

        #scrollable-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-cyber-base">

    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[70%] h-[50%] bg-cyber-violet opacity-20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-[#3F51B5] opacity-10 blur-[100px] rounded-full"></div>
        <div class="absolute inset-0 hex-bg z-0"></div>
        <div class="absolute inset-0 scanlines opacity-30"></div>
    </div>

    <main id="mobile-container" class="w-full max-w-[375px] mx-auto relative z-10 md:max-w-md lg:max-w-lg xl:max-w-xl">
        
        <header id="header" class="flex items-center justify-between w-full px-6 pt-8 pb-4 relative z-20 bg-cyber-base/80 backdrop-blur-sm">
            <button class="w-10 h-10 rounded-xl glass-panel flex items-center justify-center text-cyber-textMuted hover:text-white transition-colors">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <div class="text-center">
                <h2 class="text-white font-bold text-sm tracking-widest uppercase">Step 1/2</h2>
                <p class="text-cyber-violet text-[10px] font-mono">Playstyle Setup</p>
            </div>
            <button class="text-cyber-textMuted hover:text-white text-xs font-mono tracking-wider transition-colors">
                SKIP
            </button>
        </header>

        <section id="progress-tracker" class="w-full px-6 mb-6">
            <div class="flex items-center justify-between mb-2">
                <span class="text-cyber-violet text-xs font-mono">Initialization</span>
                <span class="text-cyber-textMuted text-xs font-mono">50%</span>
            </div>
            <div class="h-1.5 w-full bg-cyber-border rounded-full overflow-hidden">
                <div class="h-full bg-cyber-violet w-1/2 shadow-[0_0_10px_#8A2BE2] relative">
                    <div class="absolute top-0 right-0 bottom-0 w-4 bg-white/30 skew-x-[-45deg] animate-[pulse_2s_infinite]"></div>
                </div>
            </div>
        </section>

        <div id="scrollable-content" class="px-6 pb-28">
            <div class="space-y-8">
                
                <section id="platforms-selector" class="w-full">
                    <div class="flex items-center space-x-2 mb-4">
                        <i class="fa-solid fa-desktop text-cyber-violet text-sm"></i>
                        <h3 class="text-white font-semibold text-sm">Primary Hardware</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="custom-checkbox cursor-pointer relative">
                            <input type="checkbox" class="peer sr-only" checked>
                            <div class="glass-panel rounded-xl p-4 border border-cyber-border transition-all flex flex-col items-center justify-center space-y-2 group">
                                <i class="fa-brands fa-windows text-2xl text-cyber-textMuted group-hover:text-white transition-colors"></i>
                                <span class="text-xs font-medium text-cyber-textMuted group-hover:text-white transition-colors">PC</span>
                            </div>
                        </label>
                        <label class="custom-checkbox cursor-pointer relative">
                            <input type="checkbox" class="peer sr-only" checked>
                            <div class="glass-panel rounded-xl p-4 border border-cyber-border transition-all flex flex-col items-center justify-center space-y-2 group">
                                <i class="fa-brands fa-playstation text-2xl text-cyber-textMuted group-hover:text-white transition-colors"></i>
                                <span class="text-xs font-medium text-cyber-textMuted group-hover:text-white transition-colors">PlayStation</span>
                            </div>
                        </label>
                        <label class="custom-checkbox cursor-pointer relative">
                            <input type="checkbox" class="peer sr-only">
                            <div class="glass-panel rounded-xl p-4 border border-cyber-border transition-all flex flex-col items-center justify-center space-y-2 group">
                                <i class="fa-brands fa-xbox text-2xl text-cyber-textMuted group-hover:text-white transition-colors"></i>
                                <span class="text-xs font-medium text-cyber-textMuted group-hover:text-white transition-colors">Xbox</span>
                            </div>
                        </label>
                        <label class="custom-checkbox cursor-pointer relative">
                            <input type="checkbox" class="peer sr-only">
                            <div class="glass-panel rounded-xl p-4 border border-cyber-border transition-all flex flex-col items-center justify-center space-y-2 group">
                                <i class="fa-solid fa-mobile-screen-button text-2xl text-cyber-textMuted group-hover:text-white transition-colors"></i>
                                <span class="text-xs font-medium text-cyber-textMuted group-hover:text-white transition-colors">Mobile</span>
                            </div>
                        </label>
                    </div>
                </section>

                <section id="genres-selector" class="w-full">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-2">
                            <i class="fa-solid fa-layer-group text-cyber-violet text-sm"></i>
                            <h3 class="text-white font-semibold text-sm">Core Genres</h3>
                        </div>
                        <span class="text-[10px] text-cyber-textMuted font-mono">Select up to 3</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button class="px-4 py-2 rounded-lg bg-cyber-violet/20 border border-cyber-violet text-white text-xs font-medium shadow-[inset_0_0_10px_rgba(138,43,226,0.2)]">RPG</button>
                        <button class="px-4 py-2 rounded-lg glass-panel border border-cyber-border text-cyber-textMuted text-xs font-medium hover:border-cyber-violet/50 transition-colors">FPS</button>
                        <button class="px-4 py-2 rounded-lg glass-panel border border-cyber-border text-cyber-textMuted text-xs font-medium hover:border-cyber-violet/50 transition-colors">Strategy</button>
                        <button class="px-4 py-2 rounded-lg bg-cyber-violet/20 border border-cyber-violet text-white text-xs font-medium shadow-[inset_0_0_10px_rgba(138,43,226,0.2)]">Action-Adventure</button>
                        <button class="px-4 py-2 rounded-lg glass-panel border border-cyber-border text-cyber-textMuted text-xs font-medium hover:border-cyber-violet/50 transition-colors">Simulation</button>
                        <button class="px-4 py-2 rounded-lg glass-panel border border-cyber-border text-cyber-textMuted text-xs font-medium hover:border-cyber-violet/50 transition-colors">MMO</button>
                        <button class="px-4 py-2 rounded-lg glass-panel border border-cyber-border text-cyber-textMuted text-xs font-medium hover:border-cyber-violet/50 transition-colors">Indie</button>
                    </div>
                </section>

                <section id="tolerance-sliders" class="w-full space-y-6">
                    <div class="glass-panel rounded-xl p-5 border border-cyber-border">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center space-x-2">
                                <i class="fa-solid fa-skull text-cyber-textMuted text-sm"></i>
                                <h3 class="text-white font-medium text-sm">Difficulty Tolerance</h3>
                            </div>
                            <span class="text-cyber-violet text-xs font-mono">Hardcore</span>
                        </div>
                        <input type="range" min="1" max="100" value="85" class="w-full">
                        <div class="flex justify-between mt-2 text-[10px] text-cyber-textMuted font-mono">
                            <span>Casual</span>
                            <span>Souls-like</span>
                        </div>
                    </div>

                    <div class="glass-panel rounded-xl p-5 border border-cyber-border">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center space-x-2">
                                <i class="fa-solid fa-clock text-cyber-textMuted text-sm"></i>
                                <h3 class="text-white font-medium text-sm">Avg. Session Length</h3>
                            </div>
                            <span class="text-cyber-violet text-xs font-mono">2-4 Hours</span>
                        </div>
                        <input type="range" min="1" max="100" value="60" class="w-full">
                        <div class="flex justify-between mt-2 text-[10px] text-cyber-textMuted font-mono">
                            <span>Quick (15m)</span>
                            <span>Marathon (4h+)</span>
                        </div>
                    </div>
                </section>

                <section id="game-dna" class="w-full">
                    <div class="flex items-center space-x-2 mb-4">
                        <i class="fa-solid fa-dna text-cyber-emerald text-sm"></i>
                        <h3 class="text-white font-semibold text-sm">Current DNA Profile</h3>
                    </div>
                    <div class="glass-panel rounded-2xl p-4 border border-cyber-border relative" style="height: 250px;">
                        <div id="radarChart" class="w-full h-full"></div>
                    </div>
                </section>

            </div>
        </div>

        <section id="action-footer" class="fixed bottom-0 left-0 right-0 max-w-[375px] mx-auto p-6 bg-gradient-to-t from-cyber-base via-cyber-base to-transparent z-30 md:max-w-md lg:max-w-lg xl:max-w-xl">
            <button type="button" class="w-full bg-cyber-emerald hover:bg-[#45b56a] text-cyber-base font-bold text-sm py-4 rounded-xl shadow-neon-emerald transition-all transform active:scale-[0.98] flex items-center justify-center space-x-2">
                <span>SAVE & CONTINUE</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </section>

    </main>

    <script>
        window.addEventListener('load', function() {
            try {
                var data = [{
                    type: 'scatterpolar',
                    r: [85, 60, 90, 40, 75],
                    theta: ['Difficulty', 'Session Time', 'Story', 'Multiplayer', 'Exploration'],
                    fill: 'toself',
                    fillcolor: 'rgba(138, 43, 226, 0.3)',
                    line: {
                        color: '#8A2BE2',
                        width: 2,
                        shape: 'spline'
                    },
                    marker: {
                        color: '#50C878',
                        size: 6
                    }
                }];

                var layout = {
                    polar: {
                        radialaxis: {
                            visible: false,
                            range: [0, 100]
                        },
                        angularaxis: {
                            tickfont: {
                                color: '#94969F',
                                size: 10,
                                family: 'JetBrains Mono'
                            },
                            linecolor: '#2A2A35',
                            gridcolor: '#2A2A35'
                        },
                        bgcolor: 'transparent'
                    },
                    showlegend: false,
                    paper_bgcolor: 'transparent',
                    plot_bgcolor: 'transparent',
                    margin: { t: 20, r: 20, b: 20, l: 20 }
                };

                var config = {
                    responsive: true,
                    displayModeBar: false
                };

                Plotly.newPlot('radarChart', data, layout, config);
            } catch(e) {
                console.error('Chart initialization failed:', e);
            }
        });
    </script>
</body>
</html>
